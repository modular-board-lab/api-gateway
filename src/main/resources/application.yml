server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: board-service-boards
          uri: ${services.board-service.url:http://localhost:8080}
          predicates:
            - Method=GET
            - Path=/boards,/boards/**
        - id: board-service-posts
          uri: ${services.board-service.url:http://localhost:8080}
          predicates:
            - Method=GET
            - Path=/posts,/posts/**

services:
  board-service:
    url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
